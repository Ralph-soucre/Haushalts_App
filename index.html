<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Einkaufsliste</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        var socket = io();

        // Empfangene Nachrichten verarbeiten
        socket.on('item_added', function (data) {
            const itemList = document.getElementById('item-list');
            const newItem = document.createElement('li');
            newItem.textContent = data.item + ' (hinzugefügt von ' + data.user + ')';
            itemList.appendChild(newItem);
        });

        socket.on('item_deleted', function (data) {
            const itemList = document.getElementById('item-list');
            const itemToRemove = document.getElementById('item-' + data.item_id);
            if (itemToRemove) {
                itemList.removeChild(itemToRemove);
            }
        });
    </script>
</head>

<body>
    <h1>Einkaufsliste</h1>
    <ul id="item-list">
        {% for item in einkaufsliste %}
        <li id="item-{{ item.id }}">{{ item.item }} <a href="{{ url_for('delete_item', item_id=item.id) }}">Löschen</a>
        </li>
        {% endfor %}
    </ul>
    <form action="{{ url_for('add_item') }}" method="post">
        <input type="text" name="item" required>
        <button type="submit">Hinzufügen</button>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>

        <script>
            const socket = io();

            socket.on('item_added', (data) => {
                const li = document.createElement('li');
                li.id = `item-${data.id}`;
                li.textContent = `${data.item} (hinzugefügt von ${data.user})`;
                const deleteLink = document.createElement('a');
                deleteLink.href = `/delete/${data.id}`;
                deleteLink.textContent = " Löschen";
                li.appendChild(deleteLink);
                document.getElementById('einkaufsliste').appendChild(li);
            });

            socket.on('item_deleted', (data) => {
                const itemToDelete = document.getElementById(`item-${data.item_id}`);
                if (itemToDelete) {
                    itemToDelete.remove();
                }
            });

            document.getElementById('addItemForm').onsubmit = function () {
                const itemInput = this.querySelector('input[name="item"]');
                const item = itemInput.value;
                socket.emit('add_item', { item: item });  // Sendet die Eingaben an den Server
                itemInput.value = ''; // Eingabefeld zurücksetzen
                return false; // Verhindert die normale Formularübermittlung
            };
        </script>

    </form>
</body>

</html>
